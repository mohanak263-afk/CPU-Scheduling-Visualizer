<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduling Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CPU Scheduling Visualizer</h1>

    <div class="container">

        <!-- Number of Processes -->
        <label for="processCount">Number of Processes:</label>
        <input type="number" id="processCount" min="1">

        <button onclick="createTable()">Create Table</button>

        <br><br>

        <!-- Process Input Table -->
        <div id="tableContainer"></div>

        <br>

        <!-- Algorithm Selection -->
        <label for="algorithm">Select Algorithm:</label>

        <select id="algorithm">

            <option value="fcfs">FCFS</option>

            <option value="sjf">
                SJF (Non Preemptive)
            </option>

            <option value="sjfp">
                SJF (Preemptive / SRTF)
            </option>

            <option value="priority">
                Priority (Non Preemptive)
            </option>

            <option value="priorityp">
                Priority (Preemptive)
            </option>

            <option value="rr">
                Round Robin
            </option>

        </select>

        <input
            type="number"
            id="quantum"
            min="1"
            placeholder="Time Quantum (Round Robin)"
        >

        <br><br>

        <!-- Buttons -->

        <button onclick="calculate()">
            Calculate
        </button>

        <button onclick="compareAll()">
            Compare Algorithms
        </button>

        <br><br>

        <!-- Average Results -->

        <div id="result"></div>

        <br>

        <!-- Process Table -->

        <div id="resultTable"></div>

        <br>

        <!-- Comparison -->

        <h3>Algorithm Comparison</h3>

        <div id="comparison"></div>

        <hr>

        <!-- Gantt Chart -->

        <h3>Gantt Chart</h3>

        <div id="gantt"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
